language: "en"

reviews:
  profile: "chill"
  request_changes_workflow: false

  high_level_summary: true
  poem: false
  review_status: true

  auto_review:
    enabled: true
    drafts: false

  path_filters:
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"

  changed_files_summary: true

  tools:
    markdownlint:
      enabled: false

